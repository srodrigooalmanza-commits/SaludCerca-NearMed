  <style>
    /* VARIABLES & RESET */
    :root {
      --primary: #2C7A7B;
      --bg: #F7F9FC;
      --card-bg: #FFFFFF;
      --text-main: #1A2C3E;
      --text-muted: #4A627A;
      --border: #E2E8F0;
      
      --c-urgent: #2B6CB0;
      --c-general: #ED8936;
      --c-doctor: #3182CE;
      --c-clinic: #00A3C4;
      --c-pharmacy: #38A169;
      --c-warning: #D69E2E;
      --c-success: #38A169;
    }
    
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    /* CORRECCIÓN DE SCROLL PARA MÓVIL */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: auto !important;
      -webkit-overflow-scrolling: touch;
    }
    
    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* HEADER */
    header { 
      background-color: var(--card-bg); 
      padding: 15px 20px; 
      border-bottom: 1px solid var(--border); 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      position: sticky;
      top: 0;
      z-index: 100;
    }
    h1 { font-size: 22px; font-weight: 600; color: var(--primary); letter-spacing: -0.5px; }
    .lang-selector select { padding: 8px; border-radius: 6px; border: 1px solid var(--border); font-size: 14px; background: var(--bg); cursor: pointer; }

    /* MAIN LAYOUT - SCROLLABLE */
    .app-container { 
      display: flex; 
      flex-direction: column; 
      min-height: calc(100% - 70px);
    }
    @media (min-width: 768px) { 
      .app-container { 
        flex-direction: row; 
        min-height: calc(100% - 70px);
      } 
    }

    /* SIDEBAR */
    .sidebar { 
      width: 100%; 
      display: flex; 
      flex-direction: column; 
      background: var(--card-bg); 
      border-right: 1px solid var(--border);
      max-height: 50vh;
      overflow-y: auto;
    }
    @media (min-width: 768px) { 
      .sidebar { 
        width: 400px; 
        max-height: calc(100vh - 70px);
        overflow-y: auto;
      } 
    }
    
    .controls { 
      padding: 20px; 
      border-bottom: 1px solid var(--border); 
      background-color: var(--bg);
      flex-shrink: 0;
    }
    .control-group { margin-bottom: 15px; }
    .control-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
    
    .slider-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .slider-val { font-weight: 600; font-size: 14px; color: var(--text-main); }
    input[type=range] { width: 100%; accent-color: var(--primary); cursor: pointer; }
    
    select.filter-select { 
      width: 100%; 
      padding: 10px; 
      border: 1px solid var(--border); 
      border-radius: 8px; 
      background: var(--card-bg); 
      font-size: 14px; 
      color: var(--text-main);
    }
    
    .checkbox-lbl { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; color: var(--text-main); }
    
    .btn-search { 
      width: 100%; 
      background: var(--primary); 
      color: white; 
      border: none; 
      padding: 12px; 
      border-radius: 8px; 
      font-size: 16px; 
      font-weight: 600; 
      cursor: pointer; 
      margin-top: 10px;
    }
    .btn-search:hover { opacity: 0.9; }

    /* RESULTADOS - SCROLL INTERNO */
    .results-list { 
      flex: 1; 
      padding: 15px; 
      background: var(--bg);
      overflow-y: auto;
    }
    .status-msg { text-align: center; color: var(--text-muted); font-size: 14px; padding: 30px 20px; }
    
    .card { 
      background: var(--card-bg); 
      border: 1px solid var(--border); 
      border-radius: 12px; 
      padding: 15px; 
      margin-bottom: 15px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
      cursor: pointer;
    }
    .card:hover { border-color: var(--text-muted); }
    .card.urgent-card { background-color: #EBF8FF; border-top: 4px solid var(--c-urgent); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .card-title { font-size: 16px; font-weight: 600; line-height: 1.2; }
    .tag-sponsor { font-size: 11px; background: #FFF8E1; color: var(--c-warning); padding: 3px 6px; border-radius: 4px; font-weight: 600; display: inline-block; margin-bottom: 5px; }
    .tag-type { font-size: 12px; padding: 4px 10px; border-radius: 12px; font-weight: 600; display: inline-block; margin-bottom: 10px; color: white; }
    
    .card-info { font-size: 14px; color: var(--text-muted); margin-bottom: 4px; display: flex; gap: 6px; }
    .btn-route { 
      display: inline-block; 
      margin-top: 10px; 
      padding: 10px 12px; 
      background: var(--c-doctor); 
      color: white; 
      text-decoration: none; 
      border-radius: 6px; 
      font-size: 14px; 
      font-weight: 600; 
      text-align: center; 
      width: 100%;
      border: none;
      cursor: pointer;
    }
    .btn-route:hover { background: #2B6CB0; }

    /* MAPA - ALTURA FIJA PARA QUE NO BLOQUEE SCROLL */
    .map-area { 
      width: 100%;
      height: 350px;
      position: relative;
      flex-shrink: 0;
    }
    @media (min-width: 768px) {
      .map-area {
        flex: 1;
        height: auto;
        min-height: 400px;
      }
    }
    #map { 
      width: 100%; 
      height: 100%; 
      background: #E9E5DE; 
    }
    
    .marker-pin { 
      width: 24px; 
      height: 24px; 
      border-radius: 50%; 
      border: 3px solid white; 
      box-shadow: 0 2px 6px rgba(0,0,0,0.3); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      color: white; 
      font-size: 11px; 
      font-weight: 600;
    }
    
    /* BOTÓN DONACIÓN */
    .btn-donate { 
      position: fixed; 
      bottom: 20px; 
      right: 20px; 
      background: var(--c-general); 
      color: white; 
      border: none; 
      padding: 12px 20px; 
      border-radius: 30px; 
      font-weight: 600; 
      font-size: 15px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
      cursor: pointer; 
      z-index: 1000;
    }
    
    footer { 
      text-align: center; 
      padding: 12px; 
      font-size: 12px; 
      color: var(--text-muted); 
      background: var(--card-bg); 
      border-top: 1px solid var(--border); 
      flex-shrink: 0;
    }

    /* MODAL DONACIÓN */
    .modal-overlay { 
      position: fixed; 
      top: 0; 
      left: 0; 
      right: 0; 
      bottom: 0; 
      background: rgba(0,0,0,0.5); 
      display: none; 
      justify-content: center; 
      align-items: center; 
      z-index: 2000; 
    }
    .modal-overlay.active { display: flex; }
    .modal { 
      background: var(--card-bg); 
      width: 90%; 
      max-width: 350px; 
      border-radius: 16px; 
      padding: 25px; 
      text-align: center; 
      position: relative; 
    }
    .modal-close { 
      position: absolute; 
      top: 15px; 
      right: 15px; 
      background: none; 
      border: none; 
      font-size: 20px; 
      cursor: pointer; 
      color: var(--text-muted); 
    }
    .grid-btns { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 10px; 
      margin-bottom: 15px; 
    }
    .grid-btns button { 
      padding: 10px; 
      border: 1px solid var(--border); 
      border-radius: 8px; 
      background: var(--bg); 
      cursor: pointer; 
      font-weight: 600;
    }
    .btn-paypal { 
      display: block; 
      width: 100%; 
      padding: 12px; 
      background: var(--c-doctor); 
      color: white; 
      font-weight: 600; 
      text-decoration: none; 
      border-radius: 8px; 
      margin-bottom: 10px; 
    }
  </style>

    let mockData = [];

    function t(key) {
      return i18n[lang][key] || i18n['es'][key] || key;
    }

    function changeLang(newLang) {
      lang = newLang;
      document.body.dir = (lang === 'ar') ? 'rtl' : 'ltr';
      
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (el.tagName === 'INPUT' && el.type === 'checkbox') {
          const span = el.nextElementSibling;
          if (span && span.getAttribute('data-i18n')) span.innerText = t(key);
        } else {
          el.innerText = t(key);
        }
      });
      
      if (document.getElementById('resultsList').innerHTML.indexOf('card') !== -1 || mockData.length > 0) {
        renderResults();
      } else if (!userLoc) {
        document.getElementById('resultsList').innerHTML = `<div class="status-msg" data-i18n="geoPrompt">${t('geoPrompt')}</div>`;
      }
    }

    function calcKmFromSlider(val) {
      const exp = parseInt(val) / 100;
      return Math.round(1 * Math.pow(50, exp));
    }
    
    function updateRadiusLabel(val) {
      radiusKm = calcKmFromSlider(val);
      document.getElementById('radVal').innerText = radiusKm + " km";
    }

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371; 
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function generateMockData() {
      const templates = [
        { cIdx: '1', pIdx: 1, c: '#2B6CB0', e: true },
        { cIdx: '2', pIdx: 2, c: '#ED8936', e: false },
        { cIdx: '3', pIdx: 3, c: '#3182CE', e: false },
        { cIdx: '4', pIdx: 4, c: '#00A3C4', e: false },
        { cIdx: '5', pIdx: 5, c: '#38A169', e: false }
      ];

      for (let i = 0; i < 40; i++) {
        const rDist = Math.random() * 50; 
        const rAngle = Math.random() * Math.PI * 2;
        const lat = userLoc.lat + (rDist / 111) * Math.cos(rAngle);
        const lon = userLoc.lon + (rDist / (111 * Math.cos(userLoc.lat * Math.PI/180))) * Math.sin(rAngle);
        
        const tmpl = templates[Math.floor(Math.random() * templates.length)];
        
        mockData.push({
          id: i,
          typeKey: `type_${tmpl.cIdx}`,
          sumKey: `sum_${tmpl.cIdx}`,
          priority: tmpl.pIdx,
          urgent: tmpl.e,
          color: tmpl.c,
          lat: lat, lon: lon,
          name: `Centro Médico ${String.fromCharCode(65 + (i%26))} - ${i}`,
          address: `Av. Principal ${100 + i * 5}, Zona Norte`,
          phone: `+00 555 ${1000 + i}`,
          sponsor: (i === 0 || i === 1)
        });
      }
    }

    let searchResults = [];

    // FUNCIÓN PARA ABRIR RUTA CON SELECTOR DE APP
    function abrirRutaConSelector(destLat, destLon, destinoNombre) {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      const userLat = userLoc.lat;
      const userLon = userLoc.lon;
      
      const checkWaze = () => {
        const wazeUrl = `waze://?ll=${destLat},${destLon}&navigate=yes`;
        window.location.href = wazeUrl;
        setTimeout(() => {
          window.location.href = `https://www.waze.com/ul?ll=${destLat},${destLon}&navigate=yes`;
        }, 2000);
      };
      
      let opciones = [];
      let mensaje = "🗺️ ¿Cómo quieres llegar?\n\n";
      
      if (isIOS) {
        opciones = [
          { id: 1, nombre: "🗺️ Apple Maps", url: `http://maps.apple.com/?daddr=${destLat},${destLon}&dirflg=d` },
          { id: 2, nombre: "📱 Google Maps", url: `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLon}&destination=${destLat},${destLon}&travelmode=driving` },
          { id: 3, nombre: "🚗 Waze", url: null, funcion: checkWaze }
        ];
        mensaje += "1. Apple Maps\n2. Google Maps\n3. Waze (si instalado)\n\nElige un número:";
      } else {
        opciones = [
          { id: 1, nombre: "📱 Google Maps", url: `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLon}&destination=${destLat},${destLon}&travelmode=driving` },
          { id: 2, nombre: "🚗 Waze", url: null, funcion: checkWaze }
        ];
        mensaje += "1. Google Maps\n2. Waze (si instalado)\n\nElige un número:";
      }
      
      const seleccion = prompt(mensaje, "1");
      const opcionElegida = opciones.find(o => o.id == seleccion);
      
      if (opcionElegida) {
        if (opcionElegida.url) {
          window.open(opcionElegida.url);
        } else if (opcionElegida.funcion) {
          opcionElegida.funcion();
        }
      } else {
        alert("Opción no válida. Se abrirá Google Maps por defecto.");
        window.open(`https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLon}&destination=${destLat},${destLon}&travelmode=driving`);
      }
    }

    function doSearch() {
      if(!userLoc) return;
      document.getElementById('resultsList').innerHTML = `<div class="status-msg">${t('loading')}</div>`;
      
      const includePharm = document.getElementById('checkPharm').checked;
      
      let filtered = mockData.map(fac => {
        return { ...fac, dist: getDistance(userLoc.lat, userLoc.lon, fac.lat, fac.lon) };
      }).filter(f => f.dist <= radiusKm);

      if(!includePharm) {
        filtered = filtered.filter(f => f.priority !== 5);
      }

      filtered.sort((a, b) => {
        if(a.urgent && !b.urgent) return -1;
        if(!a.urgent && b.urgent) return 1;
        if(a.priority !== b.priority) return a.priority - b.priority;
        return a.dist - b.dist;
      });

      searchResults = filtered.slice(0, 10);
      renderResults();
      renderMarkers();
    }

    function renderResults() {
      const list = document.getElementById('resultsList');
      if (searchResults.length === 0) {
        list.innerHTML = `<div class="status-msg">${t('noResults')}</div>`;
        return;
      }

      let html = '';

      searchResults.forEach(r => {
        const typeStr = t(r.typeKey);
        const sumStr = t(r.sumKey);
        const uIcon = r.urgent ? '⚡ ' : '';
        const sponHTML = r.sponsor ? `<div class="tag-sponsor">${t('sponsor')}</div>` : '';
        const cardClass = r.urgent ? "card urgent-card" : "card";

        html += `
          <div class="${cardClass}" onclick="map.setView([${r.lat}, ${r.lon}], 14)">
            ${sponHTML}
            <div class="card-header">
              <div class="card-title">${uIcon}${r.name}</div>
            </div>
            <div class="tag-type" style="background-color: ${r.color}">${typeStr}</div>
            <div class="card-info">📍 ${r.dist.toFixed(1)} km · ${r.address}</div>
            <div class="card-info">📞 ${r.phone}</div>
            <div class="card-info" style="margin-top:8px;">💡 ${sumStr}</div>
            <button class="btn-route" onclick="event.stopPropagation(); abrirRutaConSelector(${r.lat}, ${r.lon}, '${r.name.replace(/'/g, "\\'")}')">${t('routeBtn')}</button>
          </div>
        `;
      });
      list.innerHTML = html;
    }

    function renderMarkers() {
      facilityMarkers.forEach(m => map.removeLayer(m));
      facilityMarkers = [];

      const bounds = [[userLoc.lat, userLoc.lon]];

      searchResults.forEach(r => {
        const customIcon = L.divIcon({
          className: `custom-pin-${r.id}`,
          html: `<div class="marker-pin" style="background-color: ${r.color};">${r.urgent ? '⚡' : ''}</div>`,
          iconSize: [24, 24],
          iconAnchor: [12, 12]
        });
        
        const m = L.marker([r.lat, r.lon], { icon: customIcon }).addTo(map)
          .bindPopup(`
            <b>${r.name}</b><br>
            ${t(r.typeKey)}<br>
            ${r.dist.toFixed(1)} km<br>
            <button onclick="abrirRutaConSelector(${r.lat}, ${r.lon}, '${r.name.replace(/'/g, "\\'")}')" style="margin-top:8px; background:#3182CE; color:white; border:none; padding:5px 10px; border-radius:6px; cursor:pointer;">${t('routeBtn')}</button>
          `);
        
        facilityMarkers.push(m);
        bounds.push([r.lat, r.lon]);
      });

      if(bounds.length > 1) {
        map.fitBounds(bounds, { padding: [30, 30] });
      }
    }

    function toggleModal(show) {
      document.getElementById('donateModal').classList.toggle('active', show);
    }
    
    function alertDonate(amt) {
      alert(`Donación de ${amt} USD iniciada. ¡Gracias por tu apoyo!`);
      toggleModal(false);
    }

    // Inicialización
    window.onload = () => {
      map = L.map('map').setView([0, 0], 2);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
      }).addTo(map);

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            userLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            map.setView([userLoc.lat, userLoc.lon], 13);
            
            userMarker = L.marker([userLoc.lat, userLoc.lon]).addTo(map).bindPopup("Tu ubicación");
            generateMockData();
            doSearch();
          },
          (err) => {
            document.getElementById('resultsList').innerHTML = `<div class="status-msg" style="color:var(--c-urgent);">${t('geoError')}</div>`;
          }
        );
      } else {
        document.getElementById('resultsList').innerHTML = `<div class="status-msg" style="color:var(--c-urgent);">${t('geoError')}</div>`;
      }
      
      changeLang('es');
      
      if (window.innerWidth < 768) {
        document.querySelector('.map-area').style.height = '300px';
      }
    };
  </script>
</body>
